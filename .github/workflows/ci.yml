name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  CI: "true"

jobs:
  # Static checks — fast, gates the rest.
  lint-and-typecheck:
    name: Lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  # Build the production bundle once. Other jobs can reuse it via cache key.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Upload .next
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 1

  # E2E + contract + a11y suites. Runs against the production build for
  # realistic timing and to surface any prod-only React errors.
  e2e:
    name: E2E + contract + a11y (Chromium)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Restore .next
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: npx playwright install --with-deps chromium
      - name: Run E2E + contract + a11y
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
      - name: Upload trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 7

  # Cross-browser sanity check. Doesn't gate merges by default — set to
  # `if: always()` rather than `needs: e2e` so a Chromium failure doesn't
  # mask a Firefox/WebKit issue. Promote to required check once the
  # green-rate is high.
  cross-browser:
    name: Cross-browser (Firefox + WebKit)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Restore .next
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-all-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-all-${{ runner.os }}-
      - run: npx playwright install --with-deps firefox webkit
      - name: Run E2E + contract in Firefox + WebKit
        run: npm run test:e2e:cross-browser
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-cross-browser
          path: playwright-report
          retention-days: 7
